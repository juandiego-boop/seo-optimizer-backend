<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEO Optimizer Pro - Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.header{background:#008060;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.header h1{color:white;font-size:1.1rem;font-weight:600}
.badge{background:rgba(255,255,255,.2);color:white;padding:.3rem .8rem;border-radius:20px;font-size:.75rem}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:2.5rem;width:360px;text-align:center}
.login-box h2{color:#008060;margin-bottom:.5rem}
.login-box p{color:#718096;font-size:.875rem;margin-bottom:1.5rem}
.inp{width:100%;padding:.75rem 1rem;background:#0f1117;border:1.5px solid #2d3748;border-radius:8px;color:#e2e8f0;font-size:.9rem;margin-bottom:1rem;font-family:inherit}
.inp:focus{outline:none;border-color:#008060}
.btn{padding:.6rem 1.2rem;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:500}
.btn-primary{background:#008060;color:white;width:100%;padding:.75rem}
.btn-sm{padding:.35rem .8rem;font-size:.78rem}
.btn-green{background:#008060;color:white}
.btn-yellow{background:#d97706;color:white}
.btn-purple{background:#7c3aed;color:white}
.btn-red{background:#dc2626;color:white}
.btn-outline{background:transparent;color:#008060;border:1.5px solid #008060}
.btn-gray{background:transparent;color:#a0aec0;border:1.5px solid #4a5568}
.container{max-width:1100px;margin:0 auto;padding:1.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:#1a1f2e;border:1px solid #2d3748;border-radius:10px;padding:1.25rem;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700;color:#008060}
.stat-card .lbl{font-size:.78rem;color:#718096;margin-top:.25rem}
.card{background:#1a1f2e;border:1px solid #2d3748;border-radius:10px;padding:1.25rem;margin-bottom:1.25rem}
.card-title{font-size:.75rem;font-weight:600;color:#718096;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1rem}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:.5rem .75rem;font-size:.72rem;color:#718096;text-transform:uppercase;border-bottom:1px solid #2d3748}
td{padding:.65rem .75rem;font-size:.85rem;border-bottom:1px solid #1a1f2e;vertical-align:middle}
tr:hover td{background:#1e2535}
.bp{display:inline-block;padding:.15rem .5rem;border-radius:20px;font-size:.68rem;font-weight:600}
.bfree{background:#1a2e1a;color:#4ade80}
.bstarter{background:#1a1a2e;color:#818cf8}
.bgrowth{background:#2e1a1a;color:#f87171}
.bpro{background:#2e2a1a;color:#fbbf24}
.bunlim{background:#0f2e2e;color:#34d399}
.chip{display:inline-block;background:#0f2e1a;color:#34d399;padding:.15rem .5rem;border-radius:6px;font-size:.78rem;font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:1.75rem;width:400px;max-width:95vw}
.modal h3{margin-bottom:1rem;font-size:.95rem;color:#e2e8f0}
.modal label{display:block;font-size:.75rem;color:#718096;margin-bottom:.35rem}
.mfooter{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1rem}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;padding:.75rem 1.25rem;border-radius:8px;font-size:.85rem;color:white;opacity:0;transition:opacity .3s;z-index:999;pointer-events:none}
.toast.show{opacity:1}
.screen{display:none}
.screen.active{display:block}
.actions{display:flex;gap:.4rem;flex-wrap:wrap}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-wrap">
    <div class="login-box">
      <div style="font-size:2.5rem;margin-bottom:1rem">&#128272;</div>
      <h2>Panel Admin</h2>
      <p>SEO Optimizer Pro</p>
      <input id="adminKey" class="inp" type="password" placeholder="Clave de administrador">
      <button id="btnLogin" class="btn btn-primary">Entrar</button>
    </div>
  </div>
</div>

<div id="adminScreen" class="screen">
  <div class="header">
    <h1>&#9881; SEO Optimizer Pro &mdash; Admin</h1>
    <div style="display:flex;align-items:center;gap:1rem">
      <span class="badge" id="headerStats">-</span>
      <button id="btnLogout" class="btn btn-sm btn-gray">Salir</button>
    </div>
  </div>
  <div class="container">
    <div class="stats-grid">
      <div class="stat-card"><div class="num" id="statTotal">-</div><div class="lbl">Tiendas instaladas</div></div>
      <div class="stat-card"><div class="num" id="statUnlimited">-</div><div class="lbl">Con ilimitados</div></div>
      <div class="stat-card"><div class="num" id="statCredits">-</div><div class="lbl">Creditos totales</div></div>
    </div>
    <div class="card">
      <div class="card-title">Acciones</div>
      <div style="display:flex;gap:.6rem;flex-wrap:wrap">
        <button id="btnAddCredits" class="btn btn-sm btn-green">+ Agregar creditos</button>
        <button id="btnSetUnlimited" class="btn btn-sm btn-purple">&#8734; Poner ilimitados</button>
        <button id="btnSetCredits" class="btn btn-sm btn-yellow">&#9998; Establecer creditos</button>
        <button id="btnRefresh" class="btn btn-sm btn-gray">&#8635; Recargar</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Tiendas instaladas</div>
      <input id="searchInput" class="inp" type="text" placeholder="Buscar tienda..." style="margin-bottom:.75rem">
      <div id="shopsTable"><div style="text-align:center;padding:2rem;color:#718096">Cargando...</div></div>
    </div>
  </div>
</div>

<!-- Modal agregar creditos -->
<div class="modal-overlay" id="modalAdd">
  <div class="modal">
    <h3>+ Agregar creditos</h3>
    <label>Tienda</label>
    <input id="addShop" class="inp" type="text" placeholder="tienda.myshopify.com">
    <label>Creditos a agregar</label>
    <input id="addAmt" class="inp" type="number" value="100" min="1">
    <div class="mfooter">
      <button class="btn btn-sm btn-gray" data-close="modalAdd">Cancelar</button>
      <button class="btn btn-sm btn-green" id="btnConfirmAdd">Agregar</button>
    </div>
  </div>
</div>

<!-- Modal set creditos -->
<div class="modal-overlay" id="modalSet">
  <div class="modal">
    <h3>&#9998; Establecer creditos</h3>
    <label>Tienda</label>
    <input id="setShop" class="inp" type="text" placeholder="tienda.myshopify.com">
    <label>Creditos totales</label>
    <input id="setAmt" class="inp" type="number" value="500" min="0">
    <div class="mfooter">
      <button class="btn btn-sm btn-gray" data-close="modalSet">Cancelar</button>
      <button class="btn btn-sm btn-yellow" id="btnConfirmSet">Establecer</button>
    </div>
  </div>
</div>

<!-- Modal ilimitados -->
<div class="modal-overlay" id="modalUnlim">
  <div class="modal">
    <h3>&#8734; Creditos ilimitados</h3>
    <label>Tienda</label>
    <input id="unlimShop" class="inp" type="text" placeholder="tienda.myshopify.com">
    <div style="display:flex;gap:.6rem;margin-bottom:.5rem">
      <button class="btn btn-sm btn-green" id="btnSetOn">Activar</button>
      <button class="btn btn-sm btn-red" id="btnSetOff">Desactivar</button>
    </div>
    <div class="mfooter">
      <button class="btn btn-sm btn-gray" data-close="modalUnlim">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var API = "https://seo-plugins-seo-backend.g6kmjk.easypanel.host";
var KEY = "";
var allShops = [];

function toast(msg, ok) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = ok === false ? "#dc2626" : "#008060";
  t.classList.add("show");
  setTimeout(function() { t.classList.remove("show"); }, 3500);
}

function screen(id) {
  document.querySelectorAll(".screen").forEach(function(s) { s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
}

function openModal(id) { document.getElementById(id).classList.add("show"); }
function closeModal(id) { document.getElementById(id).classList.remove("show"); }

function badge(plan, unlim) {
  if (unlim) return "<span class=\"bp bunlim\">ILIMITADO</span>";
  var m = {free:"bfree",starter:"bstarter",growth:"bgrowth",pro:"bpro"};
  return "<span class=\"bp " + (m[plan]||"bfree") + "\">" + (plan||"free").toUpperCase() + "</span>";
}

function render(shops) {
  var el = document.getElementById("shopsTable");
  if (!shops.length) { el.innerHTML = "<div style=\"text-align:center;padding:2rem;color:#718096\">No hay tiendas</div>"; return; }
  var html = "<table><thead><tr><th>Tienda</th><th>Plan</th><th>Creditos</th><th>Instalada</th><th>Acciones</th></tr></thead><tbody>";
  shops.forEach(function(s) {
    var d = new Date(s.created_at).toLocaleDateString("es-CO");
    html += "<tr>";
    html += "<td><strong>" + s.shop_domain + "</strong></td>";
    html += "<td>" + badge(s.plan, s.is_unlimited) + "</td>";
    html += "<td><span class=\"chip\">" + (s.is_unlimited ? "INF" : s.credits) + "</span></td>";
    html += "<td style=\"color:#718096;font-size:.75rem\">" + d + "</td>";
    html += "<td class=\"actions\">";
    html += "<button class=\"btn btn-sm btn-green\" data-action=\"add100\" data-shop=\"" + s.shop_domain + "\">+100</button>";
    html += "<button class=\"btn btn-sm btn-purple\" data-action=\"toggle-unlim\" data-shop=\"" + s.shop_domain + "\" data-unlim=\"" + s.is_unlimited + "\">INF</button>";
    html += "<button class=\"btn btn-sm btn-outline\" data-action=\"open-add\" data-shop=\"" + s.shop_domain + "\">Creditos</button>";
    html += "</td></tr>";
  });
  html += "</tbody></table>";
  el.innerHTML = html;
}

async function loadShops() {
  try {
    var r = await fetch(API + "/admin/shops", {headers: {"x-admin-key": KEY}});
    if (r.status === 401) { toast("Clave incorrecta", false); screen("loginScreen"); return; }
    var d = await r.json();
    allShops = d.shops || [];
    var unlim = allShops.filter(function(s) { return s.is_unlimited; }).length;
    var tot = allShops.reduce(function(a, s) { return a + (s.is_unlimited ? 0 : (s.credits||0)); }, 0);
    document.getElementById("statTotal").textContent = allShops.length;
    document.getElementById("statUnlimited").textContent = unlim;
    document.getElementById("statCredits").textContent = tot.toLocaleString("es-CO");
    document.getElementById("headerStats").textContent = allShops.length + " tiendas";
    render(allShops);
  } catch(e) { toast("Error de conexion", false); }
}

async function post(path, body) {
  var r = await fetch(API + path, {
    method: "POST",
    headers: {"x-admin-key": KEY, "Content-Type": "application/json"},
    body: JSON.stringify(body)
  });
  return r.json();
}

// LOGIN
document.getElementById("btnLogin").addEventListener("click", async function() {
  var key = document.getElementById("adminKey").value.trim();
  if (!key) return;
  var r = await fetch(API + "/admin/shops", {headers: {"x-admin-key": key}});
  if (r.ok) { KEY = key; screen("adminScreen"); loadShops(); }
  else { toast("Clave incorrecta", false); document.getElementById("adminKey").value = ""; }
});

document.getElementById("adminKey").addEventListener("keydown", function(e) {
  if (e.key === "Enter") document.getElementById("btnLogin").click();
});

// LOGOUT
document.getElementById("btnLogout").addEventListener("click", function() {
  KEY = ""; allShops = [];
  document.getElementById("adminKey").value = "";
  screen("loginScreen");
});

// REFRESH
document.getElementById("btnRefresh").addEventListener("click", loadShops);

// BUSQUEDA
document.getElementById("searchInput").addEventListener("input", function() {
  var q = this.value.toLowerCase();
  render(allShops.filter(function(s) { return s.shop_domain.toLowerCase().includes(q); }));
});

// BOTONES ACCIONES RAPIDAS
document.getElementById("btnAddCredits").addEventListener("click", function() {
  document.getElementById("addShop").value = "";
  openModal("modalAdd");
});
document.getElementById("btnSetCredits").addEventListener("click", function() {
  document.getElementById("setShop").value = "";
  openModal("modalSet");
});
document.getElementById("btnSetUnlimited").addEventListener("click", function() {
  document.getElementById("unlimShop").value = "";
  openModal("modalUnlim");
});

// CONFIRMAR MODALES
document.getElementById("btnConfirmAdd").addEventListener("click", async function() {
  var shop = document.getElementById("addShop").value.trim();
  var amt = parseInt(document.getElementById("addAmt").value);
  if (!shop || !amt) return;
  var d = await post("/admin/add-credits", {shop: shop, credits: amt});
  if (d.ok) { toast("+" + amt + " creditos a " + shop + " - Total: " + d.credits); closeModal("modalAdd"); loadShops(); }
  else toast(d.error || "Error", false);
});

document.getElementById("btnConfirmSet").addEventListener("click", async function() {
  var shop = document.getElementById("setShop").value.trim();
  var amt = parseInt(document.getElementById("setAmt").value);
  if (!shop) return;
  var d = await post("/admin/set-credits", {shop: shop, credits: amt});
  if (d.ok) { toast("Creditos de " + shop + " -> " + d.credits); closeModal("modalSet"); loadShops(); }
  else toast(d.error || "Error", false);
});

document.getElementById("btnSetOn").addEventListener("click", async function() {
  var shop = document.getElementById("unlimShop").value.trim();
  if (!shop) return;
  var d = await post("/admin/set-unlimited", {shop: shop, unlimited: true});
  if (d.ok) { toast("Ilimitado activado - " + shop); closeModal("modalUnlim"); loadShops(); }
  else toast(d.error || "Error", false);
});

document.getElementById("btnSetOff").addEventListener("click", async function() {
  var shop = document.getElementById("unlimShop").value.trim();
  if (!shop) return;
  var d = await post("/admin/set-unlimited", {shop: shop, unlimited: false});
  if (d.ok) { toast("Ilimitado desactivado - " + shop); closeModal("modalUnlim"); loadShops(); }
  else toast(d.error || "Error", false);
});

// EVENT DELEGATION para tabla y cerrar modales
document.addEventListener("click", async function(e) {
  // Cerrar modal
  var cl = e.target.dataset.close;
  if (cl) { closeModal(cl); return; }
  // Cerrar haciendo click en el overlay
  if (e.target.classList.contains("modal-overlay")) {
    e.target.classList.remove("show"); return;
  }
  var btn = e.target.closest("[data-action]");
  if (!btn) return;
  var action = btn.dataset.action;
  var shop = btn.dataset.shop;
  if (action === "add100") {
    var d = await post("/admin/add-credits", {shop: shop, credits: 100});
    if (d.ok) { toast("+100 creditos a " + shop + " - Total: " + d.credits); loadShops(); }
    else toast(d.error || "Error", false);
  }
  if (action === "toggle-unlim") {
    var cur = btn.dataset.unlim === "true";
    var d2 = await post("/admin/set-unlimited", {shop: shop, unlimited: !cur});
    if (d2.ok) { toast((d2.is_unlimited ? "Ilimitado activado" : "Ilimitado desactivado") + " - " + shop); loadShops(); }
    else toast(d2.error || "Error", false);
  }
  if (action === "open-add") {
    document.getElementById("addShop").value = shop;
    openModal("modalAdd");
  }
});
</script>
</body>
</html>
