<!-- REEMPLAZA SOLO ESTA PARTE DEL authScreen -->

<div id="authScreen" class="screen active">
  <div style="background:#008060;color:white;padding:1rem 2rem;text-align:center">
    <h1 style="font-size:1.2rem">SEO Optimizer Pro</h1>
  </div>

  <div class="auth-screen">
    <div style="font-size:3rem;margin-bottom:1rem;font-family:serif">SEO</div>
    <h2>Conectar tu tienda</h2>
    <p style="color:#666;margin-bottom:1.5rem;font-size:.9rem">
      Abrir app en una pestaña nueva
    </p>

    <form id="shopForm" target="_blank" method="GET">
      <input
        id="shopInput"
        class="auth-input"
        type="text"
        name="shop"
        placeholder="mitienda.myshopify.com"
      >

      <button class="btn btn-primary" style="width:100%;padding:.75rem" type="submit">
        Conectar
      </button>
    </form>

    <p style="margin-top:1rem;font-size:.8rem;color:#999">
      Se abrirá en una nueva pestaña
    </p>
  </div>
</div>

<script>
document.getElementById("shopForm").addEventListener("submit", function(e){
  var input = document.getElementById("shopInput");
  var shop = input.value.trim();

  if(!shop){
    e.preventDefault();
    alert("Ingresa el dominio");
    return;
  }

  if(!shop.includes(".myshopify.com")){
    shop += ".myshopify.com";
  }

  this.action =
  "https://seo-plugins-seo-backend.g6kmjk.easypanel.host/app?shop=" +
  encodeURIComponent(shop);
});
</script>
