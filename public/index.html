<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>SEO Optimizer Pro</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f6f8;color:#333}
    .header{background:#008060;color:white;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
    .header h1{font-size:1.2rem;font-weight:600}
    .credits-badge{background:rgba(255,255,255,.2);padding:.4rem 1rem;border-radius:20px;font-size:.9rem;font-weight:600}
    .container{max-width:1000px;margin:0 auto;padding:2rem}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:2rem}
    .stat-card{background:white;padding:1.5rem;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);text-align:center}
    .stat-card .num{font-size:2rem;font-weight:700;color:#008060}
    .stat-card .label{font-size:.85rem;color:#666;margin-top:.3rem}
    .free-banner{background:linear-gradient(135deg,#008060,#00a47a);color:white;padding:1rem 1.5rem;border-radius:8px;margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
    .section-title{font-size:1.1rem;font-weight:600;margin-bottom:1rem;color:#333}
    .products-grid{display:flex;flex-direction:column;gap:.75rem;margin-bottom:2rem}
    .product-card{background:white;border-radius:8px;padding:1.25rem 1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .product-card.optimized{border-left:4px solid #008060}
    .product-top{display:flex;align-items:center;gap:1rem}
    .product-info{flex:1}
    .product-title{font-weight:500;font-size:.95rem}
    .product-desc{font-size:.8rem;color:#666;margin-top:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
    .suggest-panel{margin-top:1rem;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:1.25rem;display:none}
    .suggest-panel.show{display:block}
    .field-group{margin-bottom:1rem}
    .field-label{font-size:.75rem;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;display:flex;justify-content:space-between;align-items:center}
    .field-label span{background:#e8f4f0;color:#008060;padding:.1rem .5rem;border-radius:10px;font-size:.7rem;font-weight:500}
    .field-input{width:100%;padding:.6rem .8rem;border:1.5px solid #d1d5db;border-radius:6px;font-size:.875rem;font-family:inherit;resize:vertical}
    .field-input:focus{outline:none;border-color:#008060;box-shadow:0 0 0 3px rgba(0,128,96,.1)}
    .char-count{font-size:.7rem;color:#9ca3af;text-align:right;margin-top:.2rem}
    .char-count.warn{color:#f59e0b}
    .char-count.over{color:#ef4444}
    .action-row{display:flex;gap:.75rem;margin-top:1rem}
    .btn{padding:.5rem 1.2rem;border-radius:6px;border:none;cursor:pointer;font-size:.875rem;font-weight:500;transition:all .2s}
    .btn-primary{background:#008060;color:white}
    .btn-primary:hover{background:#006e52}
    .btn-primary:disabled{background:#ccc;cursor:not-allowed}
    .btn-outline{background:white;color:#008060;border:1.5px solid #008060}
    .btn-outline:hover{background:#f0fdf4}
    .btn-danger{background:white;color:#dc2626;border:1.5px solid #dc2626}
    .btn-danger:hover{background:#fef2f2}
    .btn-success{background:#16a34a;color:white;cursor:default}
    .plans-section{background:white;border-radius:8px;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1);margin-bottom:2rem}
    .plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:1rem}
    .plan-card{border:2px solid #e5e7eb;border-radius:8px;padding:1.5rem;text-align:center;position:relative}
    .plan-card.popular{border-color:#008060}
    .plan-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#008060;color:white;font-size:.7rem;padding:.2rem .75rem;border-radius:20px;white-space:nowrap}
    .plan-name{font-weight:700;font-size:1rem;margin-bottom:.5rem}
    .plan-price{font-size:1.5rem;font-weight:800;color:#008060}
    .plan-credits{font-size:.85rem;color:#666;margin:.5rem 0 1rem}
    .history-section{background:white;border-radius:8px;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .history-item{padding:.75rem 0;border-bottom:1px solid #f0f0f0;font-size:.875rem}
    .history-item:last-child{border-bottom:none}
    .be
  </style></title>
  </head>
