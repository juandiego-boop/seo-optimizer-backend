<div id="authScreen" class="screen active">
  <div style="background:#008060;color:white;padding:1rem 2rem;text-align:center">
    <h1 style="font-size:1.2rem">SEO Optimizer Pro</h1>
  </div>

  <div class="auth-screen">
    <div style="font-size:3rem;margin-bottom:1rem;font-family:serif">SEO</div>
    <h2>Conectar tu tienda</h2>

    <form action="https://seo-plugins-seo-backend.g6kmjk.easypanel.host/app"
          method="GET"
          target="_blank">

      <input
        id="shopInput"
        class="auth-input"
        type="text"
        name="shop"
        placeholder="mitienda.myshopify.com"
      >

      <button class="btn btn-primary" style="width:100%;padding:.75rem" type="submit">
        Conectar
      </button>

    </form>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const shop = params.get("shop");

if (shop) {
  document.getElementById("shopInput").value = shop;
}
</script>
